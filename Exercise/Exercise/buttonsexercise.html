<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exercise on Buttons</title>
    <style>
        html,body {
            background-color: black;
        }

        .uber-btn {
            color: white;
            background-color: black;
            border: none;
            height: 40px;
            width: 110px;
            border-style: solid;
            border-color: white;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .uber-btn:hover {
            background-color: red;
            opacity: 0.85s;
        }

    .amazon-btn{
        background-color: rgb(255, 216, 20);
        border: none;
        height: 30px;
        width: 140px;
        border-radius: 15px;
        outline: none;
        cursor: pointer;
        border-color: white;
        border-style: solid;
        margin-right: 10px;   
     }

     .github-btn {
        color: white;
        background-color: rgb(46, 164, 79);
        border: none;
        height: 40px;
        width: 90px;
        font-weight: bold;
        font-size: 15px;
        border-radius: 6px;
        border-style: solid;
        border-color: white;
        cursor: pointer;
        margin-left: 10px;
        margin-right: 10px;
     }

    .bootstrap-purple {
        color:white;
        background-color: rgb(121, 82,179);
        border: none;
        height: 40px;
        width: 110px;
        border-radius: 4px;;
        font-weight: bold;
        border-style: solid;
        margin-right: 10px;
        cursor: pointer;
    }

    .bootstrap-gray{
        color:rgb(108, 117, 125);
        background-color: white;
        border-width: 1px;
        border-style: solid;
        border-color: rgb(108, 117, 125);
        height: 40px;
        width: 100px;
        border-radius: 4px;;
        font-weight: bold;
        margin-right: 10px;
        cursor: pointer;
    }

    .apply-button{
        color:azure;
        background-color: white;
        border-radius: 20px;
        border-width: 2px;
        border-style: solid;
        height: 40px;
        width: 240px;
        font-weight: 300;
        font-weight: bold;
        font-size: 15px;
        color:rgb(108, 117, 125)
    }

    .save-button{
        background-color: white;
        color: rgb(10, 102, 194);
        border-width: 1px;
        border-style: solid;
        border-color: rgb(10,102, 194);
        height: 40px;
        width: 80px;
        font-weight: bold;
        font-size: 15px;
        border-radius: 20px;
        cursor: pointer;
        margin-left: 10px;
    }
    </style>
</head>
<body>
    <button class="uber-btn">Requestn now</button>

    <button class ="amazon-btn">Add to Cart</button>
    
    <button class="github-btn">Sign up</button>

    <button class="bootstrap-purple">Get Started</button>
    <button class="bootstrap-gray">Download</button>

    <button class="apply-button">Apply on comparny website</button>
    <button class="save-button">Save</button>
</body>
</html>
