<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Exercise 13e</title>
        <style>
            p{
                font-family: arial;
                margin-top: 0;
                margin-bottom: 0;
            }

            .content {
                border-style: solid;
                box-shadow: 0 0 5px rgba(0, 0, 0, 0.25);
                width: 600px;
                border-radius: 5px;
                border-width: 1px;
                border-color: rgb(179, 154, 154);
                padding-top: 10px;
                padding-bottom: 10px;
                padding-left: 15px;
                padding-right: 15px;
            }

            .all-imbox {
                font-size: 14px;
                color: gray;
                margin-bottom: 20px;
            }

            .sender-picture {
                height: 50px;
                width: 50px;
                object-fit: cover;
                border-radius: 25px;
                margin-right: 10px;
            }

            .email {
                display: flex; flex-direction: row;
            }
            
            .email-sender { font-size: 18px; font-weight: bold;}
            .email-content {flex: 1;
            }
            .sender-time { color: gray; font-size: 14px;
            }
            .email-header {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                margin-bottom: 3px;
                align-items: center;
            }
            .subject { font-weight: bold; margin-bottom: 5px;
            }
            .message { color: gray;}
        </style>
    </head>
    <body>
        <div class="content">
            <div class="all-imbox">ALL IMBOXES</div>
            <div class="email">
                <div class="sender-picture-container">
                    <img class="sender-picture" src="cat.jpg"></div>
                <div class="email-content">
                    <div class="email-header">
                    <div class="email-sender">Chewy Promotions</div>
                    <div class="sender-time">4.58pm</div>
                </div>
                    <div class="subject">Biggest sales of the year!</p>
                    <div class="message">Hey there! We are writing to tell you about our...</our></p>
                </div>
            </div>
        </div>
    </body>
</html>
