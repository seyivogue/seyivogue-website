<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exercise 5e</title>
    <style>
        p{
            font-family: arial;
            text-align: center;
            margin-top: 0;
        }
        .new{
            color: goldenrod;
            margin-bottom: 10px;
        }

        .macbook{
            font-weight: bold;
            font-size: 24px;
        }

        .for-pros{
            font-size: 45px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .amount {
            color:gray;
            margin-bottom: 15px;;
        }

        .buy {
            background-color: rgb(0, 113, 227);
            color: black;
            padding-top: 7px;
            padding-bottom: 7px;
            padding-left: 15px;
            padding-right: 15px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <p class="new">New</p>

    <p class="macbook">Mac Book Pro</p>

    <p class="for-pros">Supercharged for pros.</p>

    <p class="amount">From $1999</p>

    <p>
        <span class="buy">Buy</span>
    </p>
</body>
</html>
