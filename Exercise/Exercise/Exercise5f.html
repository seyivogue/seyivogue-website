<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exercise 5f</title>
    <style>
        p {
            font-family: arial;
            margin-top: 0;
            margin-bottom: 0px;
        }

        .amount{
            font-size: 32px;
            font-weight: bold;
        }

        .usd{
            color: rgb(100, 100, 100);
            font-size: 16px;
            padding-left: 10px;
        }

        .today{
            color: rgb(24,128, 56);
        }

        .percent{
            color: rgb(235, 39, 39);
        }

        .hours{
            font-size: 14px;
        }
    </style>

</head>
<body>
    <p class="amount">
        1,049.61<span class="usd">USD</span>
    </p>

    <p class="today">
        +19.05 (1.75%) today
    </p>

    <p class="hours">
        After hours 1,048.00<span class="percent"> -1.61 (0.15%)</span></p>
</body>
</html>
