<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exercise 12g</title>
    <style>
        p {
            font-family: arial;
            margin-top: 0;
            margin-bottom: 0;
        }
        .row {
            display: flex;
            flex-direction: row;
            align-items: center;
            margin-bottom: 20px;
            
        }

        .profile-picture {
            height: 50px;
            width:50px;
            border-radius: 25px;
            object-fit: cover;
            margin-right: 15px;
        }

        .info {
            width: 200px;
        }

        .name {
            font-weight: bold;
            margin-bottom: 3px;
        }

        .handle {
            color: rgb(150, 150, 150);
            margin-bottom: 5px;
        }

        .category {
            color: rgb(150, 150, 150);
            font-size: 14px;
        }

        button {
            background-color: rgb(29, 155, 240);
            border: none;
            color: white;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 16px;
            padding-right: 16px;
            margin-left: 300px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="row">
        <div><img class="profile-picture" src="cat.jpg"></div>
        <div class="info">
            <p class="name">Oliver</p>
            <p class="handle">the cat</p>
            <p class="category">popular</p>
        </div>
        <button>Follow</button>
    </div>

</body>
</html>
