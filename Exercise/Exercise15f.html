<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exercise 15f</title>
    <style>
        body {
            background-color: lightblue;
            height: 3000px;
        }

        .product-img {
            height: 300px;
            width: 300px;
            object-fit: cover;
        }

        .product-container{
            position: relative;
            display: inline-block;
        }

        .interest-rate{
            position: absolute;
            background-color: black;
            color: white;
            font-family: arial;
            font-size: 18px;
            font-weight: bold;
            top: 10px;
            right:0;
            padding-left: 12px;
            padding-right: 12px;
            padding-top: 8px;
            padding-bottom: 8px;
        }

        .botton-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.6);
            font-family: arial;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .add-to-cart-botton{
            background-color: white;
            border-width: 1px;
            border-style: solid;
            border-color: black;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 15px;
            padding-right: 15px;
        }
    </style>
</head>
<body>
    <div class="product-container">
        <img class="product-img" src="brown-suade-shoe.jpg">
        <div class="interest-rate">20% off</div>
        <div class="botton-overlay">
            <button class="add-to-cart-botton">Add to Cart</button>
        </div>
    </div>
</body>
</html>
