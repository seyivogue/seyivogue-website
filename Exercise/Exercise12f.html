<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exercise 12f</title>
    <style>
        div {
            font-family: arial;
        }

        .header {
            display: flex;
            color: white;
            justify-content: space-between;
            background-color: rgb(120, 82, 178);
            flex-direction: row;
            padding-left: 15px;
            padding-right: 15px;
            align-items: center;
        }

        .home-link {
            font-weight: bold;
        }

        .text-box {
            width: 500px;
            border: none;
            margin-top: 12px;
            margin-bottom: 12px;
            height: 30px;
            border-radius: 15px;
            padding-left: 15px;
        }

        button {
            background-color: rgb(120, 82, 178);
            color: white;
            border-width: 1px;
            border-style: solid;
            border-color: white;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 15px;
            padding-right: 15px;
            border-radius: 5px;
            
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="home-link">Home</div>
        <div>
            <input class="text-box" type="text" placeholder="search">
        </div>
        <button>Download</button>
    </div>    
</body>
</html>
