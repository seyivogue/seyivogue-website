<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exercise 7g</title>
    <style>
        .thumbnail{
            width: 50px;
            height: 50px;
            object-fit: cover;
            display:inline-block;
            vertical-align: middle;
            border-radius: 25px;
            margin-right: 5px;
        }

        .tweet-button{
            background-color: rgb(29, 155, 240);
            border-radius: 30px;
            color: white;
            border: none;
            font-size: 16px;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-right: 16px;
            padding-left: 16px;
            vertical-align: middle;
            font-weight: bold;
        }

        .text-box{
            font-size: 18px;
            border: none;
            width: 300px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <img class="thumbnail" src="thumbnail-1.webp">

    <input type="text" class="text-box" placeholder="What's happening?">

    <button class="tweet-button">Tweet</button>
</body>
</html>
