<!DOCTYPE html>
<html lang="en">
<head>
    <title>Buttons Second Exercise</title>
    <style>
        .add-to-cart {
            background-color: rgb(255, 216, 20);
            border-radius: 20px;
            border: none;
            padding: 5px 20px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 25px;
        }
        .buy-now {
            background-color: rgb(255, 164,28);
            border: none;
            border-radius: 20px;
            padding:5px 20px;
            font-family: arial;
            font-size: 16px;
            font-weight: 700;
            margin-top: 20px;
        }
        a {
            color: rgb(0, 113, 133);
        }
        a:hover {
            color: red;
        }
        a:active {
            color: darkgreen;
        }

    </style>
</head>
<body>
    <a href="https://www.amazon.com">Back to Amazon</a>

    <h1>Nike Black Running Shoes</h1>

    <p style="color: green; font-size: 20px;"><b>$39 - in stock.</b></p>

    <p>Free delivery tomorrow</p>

    <button class="add-to-cart">Add to Cart</button>
    <button class="buy-now">Add to Cart</button>
</body>
</html>
