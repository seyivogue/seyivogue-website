<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exercise 15</title>
    <style>
        body {
            background-color: lightblue;
            height: 3000px;
        }

        .product-img {
            height: 300px;
            width: 300px;
            object-fit: cover;
        }

        .product-container{
            position: relative;
            display: inline-block;
        }

        .interest-rate{
            position: absolute;
            background-color: black;
            color: white;
            font-family: arial;
            font-size: 18px;
            font-weight: bold;
            top: 20px;
            right:0;
            padding-left: 12px;
            padding-right: 12px;
            padding-top: 6px;
            padding-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="product-container">
        <img class="product-img" src="blue-suade-shoe.jpg">
        <div class="interest-rate">20% off</div>
    </div>
</body>
</html>
